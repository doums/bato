name: Deployment

on:
  push:
    tags:
      - v*

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      ARTIFACT_DIR: artifact
      BINARY_NAME: bato-linux-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install system deps
        run: sudo apt-get install libudev-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Prepare artifact
        run: |
          mkdir ${{ env.ARTIFACT_DIR }}
          mv -f target/release/bato ${{ env.ARTIFACT_DIR }}/${{ env.BINARY_NAME }}
          cd ${{ env.ARTIFACT_DIR }}
          sha256sum ${{ env.BINARY_NAME }} > ${{ env.BINARY_NAME }}.sha256sum
          ls -lh
      - name: Print build info
        run: |
          echo "--------------------------------------------"
          echo "binary name: ${{ env.BINARY_NAME }}"
          echo "sha256sum: $(cat ${{ env.ARTIFACT_DIR }}/${{ env.BINARY_NAME }}.sha256sum)"
          echo "file size: $(du -h ${{ env.ARTIFACT_DIR }}/${{ env.BINARY_NAME }} | cut -f1)"
          echo "--------------------------------------------"
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bato-linux-x86_64
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 2
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v6
        with:
          name: bato-linux-x86_64
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            artifacts/*

  aur-publish:
    name: Publish AUR package
    needs: release
    runs-on: ubuntu-latest
    env:
      PKGBUILD: ./.pkg/arch/PKGBUILD
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update PKGBUILD
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # strip v prefix
          version="${RELEASE_TAG#v}"
          # ⚠ Dashes are not allowed in package version, replace any - by _
          pkgver=${version//-/_}
          echo "pkgver: $pkgver"
          # update pkgver
          sed -i "s/pkgver=.*/pkgver=$pkgver/" ${{ env.PKGBUILD }}
          echo '--------------------------------------------'
          cat ${{ env.PKGBUILD }}
      - name: Publish
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: bato
          pkgbuild: ${{ env.PKGBUILD }}
          updpkgsums: true
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: ${{ github.ref_name }}
